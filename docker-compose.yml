services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: noder
      POSTGRES_PASSWORD: noder
      POSTGRES_DB: noder
    ports:
      - "5433:5432"   # host 5433 to avoid clashing with other local Postgres instances
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noder -d noder"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # host 6380 to avoid clashing with a local redis-server
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3005}
      DATABASE_URL: postgres://noder:noder@postgres:5432/noder
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-please}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CORS_ORIGINS: "*"
    ports:
      - "${PORT:-3005}:${PORT:-3005}"
    command: sh -c "node dist/db/migrate.js && node dist/server.js"

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://noder:noder@postgres:5432/noder
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-please}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    command: node dist/workers/index.js

volumes:
  pgdata:
  redisdata:
